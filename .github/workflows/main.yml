name: PHP Syntax Check (CI)

# Kích hoạt quy trình mỗi khi có hành động push hoặc pull request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  syntax_check:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ repository về máy ảo của GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Thiết lập môi trường PHP (chọn phiên bản phù hợp với dự án của bạn, ví dụ 8.1)
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    # Bước 3: Chạy lệnh quét lỗi cú pháp (Lint) toàn bộ các file .php trong dự án
    - name: Check PHP Syntax
      run: |
        find . -path ./vendor -prune -o -name "*.php" -print0 | xargs -0 -n 1 -P 4 php -l
